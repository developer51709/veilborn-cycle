<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d0a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="#0d0a1a"/>
  <rect width="180" height="180" rx="38" fill="url(#bg-glow)"/>

  <!-- Glow halo behind V -->
  <path d="M46 44 L90 132 L134 44" stroke="#7c3aed" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- V letterform -->
  <path d="M46 44 L90 132 L134 44" stroke="#c4b5fd" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-blur)"/>

  <!-- Inner bright edge -->
  <path d="M46 44 L90 132 L134 44" stroke="#ede9fe" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Shadow wisps beneath V -->
  <path d="M72 145 Q90 151 108 145" stroke="#7c3aed" stroke-width="2.5"
        stroke-linecap="round" opacity="0.7"/>
  <path d="M62 154 Q90 162 118 154" stroke="#6d28d9" stroke-width="1.5"
        stroke-linecap="round" opacity="0.4"/>
</svg>
